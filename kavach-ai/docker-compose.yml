version: '3.8'

services:
  # -----------------------------------------------------
  # Infrastructure
  # -----------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: kavach-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kavach_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kavach_pass}
      POSTGRES_DB: ${POSTGRES_DB:-kavach_db}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kavach_user}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kavach_net

  postgis:
    image: postgis/postgis:15-3.4-alpine
    container_name: kavach-postgis
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kavach_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kavach_pass}
      POSTGRES_DB: ${GEO_DB:-kavach_geo}
    ports:
      - "5433:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kavach_user}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kavach_net

  redis:
    image: redis:7-alpine
    container_name: kavach-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kavach_net

  kafka:
    image: bitnami/kafka:3.7.0
    container_name: kavach-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@127.0.0.1:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      ALLOW_PLAINTEXT_LISTENER: 'yes'
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--list", "--bootstrap-server", "127.0.0.1:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kavach_net

  neo4j:
    image: neo4j:5-community
    container_name: kavach-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/kavach_graph_pass}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kavach_net

  minio:
    image: minio/minio
    container_name: kavach-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-kavach_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-kavach_minio_pass}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kavach_net

  # -----------------------------------------------------
  # Backend Microservices
  # -----------------------------------------------------
  gateway-service:
    build:
      context: ./apps/backend/api-gateway
    container_name: kavach-gateway
    ports:
      - "4000:4000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CORE_SERVICE_URL=http://core-service:4001
      - EVIDENCE_SERVICE_URL=http://evidence-vault:4002
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kavach_net

  core-service:
    build:
      context: ./apps/backend/core-intelligence
    container_name: kavach-core
    ports:
      - "4001:4001"
    environment:
      - DATABASE_URL=postgresql+psycopg://kavach_user:kavach_pass@postgres:5432/kavach_db
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - kavach_net

  evidence-vault:
    build:
      context: ./apps/backend/evidence-vault
    container_name: kavach-evidence
    ports:
      - "4002:4002"
    environment:
      - DATABASE_URL=postgresql+psycopg://kavach_user:kavach_pass@postgres:5432/kavach_db
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=kavach_admin
      - MINIO_SECRET_KEY=kavach_minio_pass
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - kavach_net

  ai-orchestrator:
    build:
      context: ./apps/backend/ai-orchestrator
    container_name: kavach-ai-orchestrator
    ports:
      - "4003:4003"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kavach_net

  fraud-network:
    build:
      context: ./apps/backend/fraud-network
    container_name: kavach-fraud-network
    ports:
      - "4004:4004"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=kavach_graph_pass
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - kavach_net

  geospatial-service:
    build:
      context: ./apps/backend/geospatial-service
    container_name: kavach-geo
    ports:
      - "4005:4005"
    environment:
      - DATABASE_URL=postgresql+psycopg://kavach_user:kavach_pass@postgis:5432/kavach_geo
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      postgis:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - kavach_net

  # -----------------------------------------------------
  # Frontend
  # -----------------------------------------------------
  command-center:
    build:
      context: ./apps/frontend/command-center
      dockerfile: Dockerfile
    container_name: kavach-command-center
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_GATEWAY=http://localhost:4000
    networks:
      - kavach_net

networks:
  kavach_net:
    driver: bridge

volumes:
  pg_data:
  postgis_data:
  redis_data:
  kafka_data:
  neo4j_data:
  minio_data:
