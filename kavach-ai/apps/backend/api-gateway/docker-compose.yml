version: '3.8'

services:
  api-gateway:
    build: .
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://kavach:kavachpass@postgres:5432/kavach_db?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretjwtkey_kavach
      - JWT_REFRESH_SECRET=supersecretrefreshkey_kavach
      - LOG_LEVEL=debug
      - SWAGGER_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./src:/usr/src/app/src

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: kavach
      POSTGRES_PASSWORD: kavachpass
      POSTGRES_DB: kavach_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kavach -d kavach_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
